<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hayfin Inbox Filer</title>
  <script src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js" type="text/javascript"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0f0f0f;
      --surface: #181818;
      --surface2: #222;
      --border: #2a2a2a;
      --text: #e8e8e8;
      --text-dim: #888;
      --text-dimmer: #444;
      --accent: #c8ff00;
      --accent-dim: rgba(200,255,0,0.12);
      --red: #ff4455;
      --red-dim: rgba(255,68,85,0.1);
      --mono: 'IBM Plex Mono', monospace;
      --sans: 'IBM Plex Sans', sans-serif;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      font-size: 13px;
      height: 100vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    /* ── HEADER ── */
    header {
      padding: 12px 14px 10px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .logo {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--accent);
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }
    .logo span { color: var(--text-dim); }

    /* ── MAIN SCROLL ── */
    main {
      flex: 1;
      overflow-y: auto;
      padding: 12px 14px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    main::-webkit-scrollbar { width: 4px; }
    main::-webkit-scrollbar-track { background: transparent; }
    main::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    /* ── STATUS / EMPTY STATE ── */
    .status {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 12px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 4px;
      color: var(--text-dim);
      font-size: 12px;
    }
    .pulse {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--accent);
      animation: pulse 1.4s ease-in-out infinite;
      flex-shrink: 0;
    }
    @keyframes pulse {
      0%,100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.4; transform: scale(0.7); }
    }

    /* ── EMAIL CARD ── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 5px;
      overflow: hidden;
      transition: border-color 0.15s;
    }
    .card.active { border-color: var(--accent); }
    .card.done { opacity: 0.45; }

    .card-header {
      padding: 10px 12px 8px;
      cursor: pointer;
      user-select: none;
    }
    .card-subject {
      font-size: 12px;
      font-weight: 500;
      line-height: 1.4;
      margin-bottom: 4px;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .card-meta {
      font-family: var(--mono);
      font-size: 10px;
      color: var(--text-dim);
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }
    .card-meta .sender {
      color: var(--text-dim);
      max-width: 160px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    /* ── SUGGESTION ROW ── */
    .suggestion {
      padding: 8px 12px;
      border-top: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 8px;
      min-height: 36px;
    }
    .suggestion.loading {
      color: var(--text-dim);
      font-size: 11px;
    }
    .folder-badge {
      font-family: var(--mono);
      font-size: 10px;
      background: var(--accent-dim);
      color: var(--accent);
      padding: 2px 7px;
      border-radius: 3px;
      flex-shrink: 0;
      max-width: 170px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .reason {
      font-size: 11px;
      color: var(--text-dim);
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    /* ── ACTION BUTTONS ── */
    .actions {
      padding: 8px 12px 10px;
      border-top: 1px solid var(--border);
      display: flex;
      gap: 6px;
      align-items: center;
    }
    .btn {
      font-family: var(--sans);
      font-size: 11px;
      font-weight: 500;
      padding: 5px 10px;
      border-radius: 3px;
      border: none;
      cursor: pointer;
      transition: all 0.12s;
    }
    .btn-confirm {
      background: var(--accent);
      color: #000;
    }
    .btn-confirm:hover { background: #d4ff1a; }
    .btn-confirm:disabled { opacity: 0.4; cursor: not-allowed; }
    .btn-skip {
      background: transparent;
      color: var(--text-dim);
      border: 1px solid var(--border);
    }
    .btn-skip:hover { color: var(--text); border-color: #444; }
    .btn-change {
      background: transparent;
      color: var(--text-dim);
      border: 1px solid var(--border);
      margin-left: auto;
    }
    .btn-change:hover { color: var(--text); border-color: #444; }

    /* folder select dropdown */
    select.folder-select {
      font-family: var(--mono);
      font-size: 10px;
      background: var(--surface2);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 3px;
      padding: 3px 6px;
      cursor: pointer;
      max-width: 190px;
    }
    select.folder-select:focus { outline: 1px solid var(--accent); }

    /* done badge */
    .done-badge {
      font-family: var(--mono);
      font-size: 10px;
      color: var(--accent);
      padding: 8px 12px 10px;
      border-top: 1px solid var(--border);
    }
    .skipped-badge {
      font-family: var(--mono);
      font-size: 10px;
      color: var(--text-dimmer);
      padding: 8px 12px 10px;
      border-top: 1px solid var(--border);
    }

    /* ── FOOTER ── */
    footer {
      padding: 8px 14px;
      border-top: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }
    .stats {
      font-family: var(--mono);
      font-size: 10px;
      color: var(--text-dimmer);
    }
    .stats b { color: var(--text-dim); }
    .btn-load {
      font-family: var(--mono);
      font-size: 10px;
      font-weight: 500;
      padding: 5px 12px;
      background: var(--accent);
      color: #000;
      border: none;
      border-radius: 3px;
      cursor: pointer;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }
    .btn-load:hover { background: #d4ff1a; }
    .btn-load:disabled { opacity: 0.4; cursor: not-allowed; }

    /* ── API KEY SETUP ── */
    .setup-panel {
      padding: 14px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 5px;
    }
    .setup-panel h3 {
      font-size: 12px;
      font-weight: 600;
      margin-bottom: 8px;
      color: var(--accent);
      font-family: var(--mono);
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }
    .setup-panel p {
      font-size: 11px;
      color: var(--text-dim);
      margin-bottom: 10px;
      line-height: 1.5;
    }
    .setup-panel input {
      width: 100%;
      font-family: var(--mono);
      font-size: 11px;
      background: var(--bg);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 3px;
      padding: 7px 10px;
      margin-bottom: 8px;
    }
    .setup-panel input:focus { outline: 1px solid var(--accent); }
    .setup-panel .btn-save {
      font-family: var(--mono);
      font-size: 10px;
      font-weight: 500;
      padding: 6px 14px;
      background: var(--accent);
      color: #000;
      border: none;
      border-radius: 3px;
      cursor: pointer;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }
    .setup-panel .btn-save:hover { background: #d4ff1a; }
    .setup-panel .note {
      font-size: 10px;
      color: var(--text-dimmer);
      margin-top: 8px;
      line-height: 1.5;
    }

    /* error */
    .error {
      font-size: 11px;
      color: var(--red);
      padding: 8px 12px;
      background: var(--red-dim);
      border: 1px solid rgba(255,68,85,0.2);
      border-radius: 4px;
    }
  </style>
</head>
<body>

<header>
  <div class="logo">Hayfin <span>//</span> Inbox Filer</div>
</header>

<main id="main-content">
  <div class="status" id="init-status">
    <span class="pulse"></span>
    <span>Initialising…</span>
  </div>
</main>

<footer>
  <div class="stats" id="stats">—</div>
  <button class="btn-load" id="btn-load" disabled>Load inbox</button>
</footer>

<script src="src/folders.js"></script>
<script src="src/app.js"></script>
</body>
</html>
